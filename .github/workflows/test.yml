name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "packages/hub/**"
      - "**.md"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run lint
        run: yarn lint

      - name: Run tests with coverage
        run: yarn test:coverage --run

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build extension
        run: yarn build:e2e
        env:
          VITE_NEW_HUB_URL: ${{ secrets.VITE_NEW_HUB_URL }}
          EXTENSION_KEY: ${{ secrets.EXTENSION_KEY }}

      - name: Run E2E tests
        run: yarn test:e2e
        env:
          VITE_NEW_HUB_URL: ${{ secrets.VITE_NEW_HUB_URL }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          E2E_TURNSTILE_BYPASS_SECRET: ${{ secrets.E2E_TURNSTILE_BYPASS_SECRET }}
          PWDEBUG: ${{ secrets.PWDEBUG }}

      - name: Upload E2E test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: packages/extension/test-results/
          retention-days: 7
